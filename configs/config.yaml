# Config file for IKS-Aware Neural Machine Translation

# Knowledge Base Configurations
kb:
  raw_data_dir: "knowledge_base"
  csv_path: "knowledge_base/iks_kb.csv"
  json_path: "knowledge_base/iks_kb.json"
  parquet_path: "knowledge_base/iks_kb.parquet"
  faiss_index_path: "knowledge_base/iks_faiss.index"
  num_concepts: 200

# Dataset Configurations
data:
  raw_data_dir: "datasets"
  csv_path: "datasets/classical_tamil_parallel.csv"
  json_path: "datasets/classical_tamil_parallel.json"
  parquet_path: "datasets/classical_tamil_parallel.parquet"
  train_path: "datasets/train.jsonl"
  val_path: "datasets/validation.jsonl"
  test_path: "datasets/test.jsonl"
  split_ratios:
    train: 0.8
    val: 0.1
    test: 0.1

# Text Processing Configurations
preprocessing:
  unicode_norm: "NFC"
  remove_duplicates: true
  lowercase_english: false

# Model Configurations
models:
  sentence_transformer: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  indictrans2: "ai4bharat/indictrans2-indic-en-dist-200M"
  nllb: "models/opus-mt-mul-en"
  source_lang: "tam_Taml"
  target_lang: "eng_Latn"

# Training Configurations (PEFT / LoRA fine-tuning)
training:
  output_dir: "models/checkpoint"
  epochs: 4
  batch_size: 4
  learning_rate: 5e-4
  optimizer: "AdamW"
  fp16: true
  gradient_accumulation_steps: 4
  warmup_steps: 100
  weight_decay: 0.01
  logging_steps: 10
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "v_proj"]

# Evaluation Configurations
evaluation:
  metrics:
    - "bleu"
    - "rouge"
    - "meteor"
    - "bertscore"
  results_path: "results/evaluation_results.json"
  error_analysis_path: "results/error_analysis.md"
